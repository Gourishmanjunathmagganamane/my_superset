<div class="superset-container">
  <!-- Loading Spinner -->
  <div *ngIf="isLoading" class="spinner-container">
    <div class="spinner"></div>
    <p>Authenticating & Loading Dashboard...</p>
  </div>
  
  <!-- Mount Point for Superset -->
  <div #dashboardContainer id="superset_embedding_div_class" [class.hidden]="isLoading"></div>
</div>
