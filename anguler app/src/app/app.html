<div class="app-layout dark-theme">
  
  <!-- Sidebar -->
  <aside class="sidebar glass-panel">
    <div class="sidebar-header">
      <div class="logo"></div>
      <h2>Analytics Hub</h2>
    </div>
    
    <nav class="sidebar-nav">
      <div *ngFor="let dash of dashboards" 
           class="nav-item" 
           [class.active]="selectedDashboard?.id === dash.id"
           (click)="selectDashboard(dash)">
        <span class="nav-icon">{{dash.icon}}</span>
        <span class="nav-text">{{dash.title}}</span>
      </div>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    
    <!-- Topbar -->
    <header class="topbar glass-panel">
      <div class="topbar-left">
        <h1>{{ selectedDashboard?.title }}</h1>
      </div>
      <div class="topbar-right">
        <button class="icon-btn">🔍</button>
        <button class="icon-btn">🔔</button>
        <div class="avatar"></div>
      </div>
    </header>

    <!-- Dashboard Container -->
    <div class="dashboard-area">
      <app-superset *ngIf="selectedDashboard" [dashboardId]="selectedDashboard.id"></app-superset>
    </div>

  </main>
</div>
