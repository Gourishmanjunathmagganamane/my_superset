{% extends "base.html" %}
{% block title %}Create New Password{% endblock %}

{% block body %}
<div style="max-width: 420px; margin: 100px auto; padding: 36px;
            background: #fff; border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);">

    <h2 style="text-align:center; color: #1e3a5f;
               font-weight: 800; margin-bottom: 28px;">
        New Password
    </h2>

    {% if messages %}
        {% for message in messages %}
        <div style="background:#fee2e2; color:#dc2626; padding:10px 14px;
                    border-radius:8px; margin-bottom:18px; text-align:center;
                    font-weight:600; font-size:14px;">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        <div style="margin-bottom:18px;">
            <label style="display:block; font-weight:600;
                          color:#334155; margin-bottom:6px; font-size:14px;">
                New Password
            </label>
            <input type="password" name="password" required autofocus
                   style="width:100%; padding:10px 14px;
                          border:1.5px solid #cbd5e1; border-radius:8px;
                          font-size:14px; outline:none; box-sizing:border-box;
                          transition: border 0.2s;"
                   onfocus="this.style.borderColor='#2563eb'"
                   onblur="this.style.borderColor='#cbd5e1'">
        </div>
        
        <div style="margin-bottom:26px;">
            <label style="display:block; font-weight:600;
                          color:#334155; margin-bottom:6px; font-size:14px;">
                Confirm New Password
            </label>
            <input type="password" name="confirm_password" required
                   style="width:100%; padding:10px 14px;
                          border:1.5px solid #cbd5e1; border-radius:8px;
                          font-size:14px; outline:none; box-sizing:border-box;
                          transition: border 0.2s;"
                   onfocus="this.style.borderColor='#2563eb'"
                   onblur="this.style.borderColor='#cbd5e1'">
        </div>

        <button type="submit"
                style="width:100%; padding:12px; background:#1e3a5f;
                       color:#fff; border:none; border-radius:8px;
                       font-size:15px; font-weight:700; cursor:pointer;
                       transition: background 0.2s;"
                onmouseover="this.style.background='#2563eb'"
                onmouseout="this.style.background='#1e3a5f'">
            Save Password & Log In
        </button>
    </form>
</div>
{% endblock %}
