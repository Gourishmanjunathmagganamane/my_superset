    flex: 1; /* Take all available space */

}

/* ================= IFRAME ================= */
#superset-container iframe {
    width: 100% !important;
    height: 100% !important;
    border: none;
    display: block;
}
</style>

{% block extra_javascript %}
<script src="https://unpkg.com/@superset-ui/embedded-sdk"></script>
    <script>
        const supersetUrl = '{{superset_url}}';
        const username = '{{superset_username}}';
        const password = '{{superset_password}}';
        const dashboardId = '{{dashboard_id}}';
        //const djangoUsername = "{{ django_username|escapejs }}";
        //const datasetIds = {{ lepra_dataset_ids|safe }};
        console.log(supersetUrl, '-----', username, '------', password, '-----', dashboardId, '----------------' )

        function logError(message, error) {
            console.error(`${message}`, error);
            alert(`${message}: Check console for details.`);
        }

        async function getAccessToken() {
            try {
                const response = await fetch(`${supersetUrl}/api/v1/security/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, provider: 'db', refresh: true }),
                });

                if (!response.ok) throw new Error(`Login failed: ${response.statusText}`);
                const data = await response.json();
                console.log("Access Token Response:", data);
                return data.access_token;
            } catch (error) {
                logError('Error fetching access token', error);
                return null;
            }
        }

        async function getCSRFToken(accessToken) {
            try {
                const response = await fetch(`${supersetUrl}/api/v1/security/csrf_token/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`,
                    },
                });

                if (!response.ok) throw new Error(`CSRF token fetch failed: ${response.statusText}`);
                const data = await response.json();
                console.log("CSRF Token Response:", data);
                return data.result;
            } catch (error) {
                logError('Error fetching CSRF token', error);
                return null;
            }
        }

        async function generateGuestToken(accessToken, csrfToken) {
            try {
                const response = await fetch(`${supersetUrl}/api/v1/security/guest_token/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`,
                        'X-CSRFToken': csrfToken, 
                    },
                    body: JSON.stringify({
                        resources: [{ type: 'dashboard', id: dashboardId }],
                        // rls: datasetIds.map(id => ({
                        //     dataset: id,
                        //     clause: rlsClause
                        // })),
                        rls : [],         
                        user: { username: 'guest', first_name: 'first', last_name: 'user' }
                    }),
                });

                if (!response.ok) throw new Error(`Guest token generation failed: ${response.statusText}`);
                const data = await response.json();
                console.log("Guest Token Response:", data);
                return data.token;
            } catch (error) {
                logError('Guest token generation failed', error);
                return null;
            }
        }

        async function waitForSDK() {
        return new Promise((resolve) => {
            const checkSDK = setInterval(() => {
                if (window.supersetEmbeddedSdk) {
                    clearInterval(checkSDK);
                    resolve();
                }
            }, 100);
        });
        }

        async function embedDashboard() {
            console.log(" Starting embedDashboard");
            await waitForSDK();

            const accessToken = await getAccessToken();
            console.log(" Access token:", accessToken);
            if (!accessToken) return;

            const csrfToken = await getCSRFToken(accessToken);
            console.log(" CSRF token:", csrfToken);
            if (!csrfToken) return;

            const guestToken = await generateGuestToken(accessToken, csrfToken);
            console.log(" Guest token:", guestToken);
            if (!guestToken) return;

            try {
                await supersetEmbeddedSdk.embedDashboard({
                    id: dashboardId,
                    supersetDomain: supersetUrl,
                    mountPoint: document.getElementById('superset-container'),
                    fetchGuestToken: () => guestToken,
                    dashboardUiConfig: {
                        hideTitle: false,
                        hideChartControls: false,
                        hideTab: false,
                    },
                });
            } catch (error) {
                logError('Failed to embed dashboard', error);
            }
        }

        embedDashboard();
    </script>
