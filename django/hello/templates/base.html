<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <link rel="icon" type="image/png" href="/static/fevicon.png">

    <title>{% block title %}{% endblock title %} | Gourish M</title>

    <style>
*, *::before, *::after { box-sizing: border-box; }

.main-nav {
  background: #0a0f1e;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 1050;
}

.main-nav .container-fluid {
  max-width: 100%;
  height: 100%;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Brand */
.main-nav .navbar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  color: #ffffff !important;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
}

.brand-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #3b82f6;
  flex-shrink: 0;
}

/* Nav links */
.main-nav .nav-link {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.5) !important;
  padding: 6px 11px !important;
  border-radius: 7px;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}

.main-nav .nav-link:hover {
  color: rgba(255,255,255,1) !important;
  background: rgba(255,255,255,0.1);
  transform: translateY(-1px);
}

.main-nav .nav-link.active {
  color: #ffffff !important;
  background: rgba(255,255,255,0.15);
  font-weight: 600;
  box-shadow: inset 0 -2px 0 0 #3b82f6;
}

/* Dashboards button */
.btn-dashboards {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: #ffffff !important;
  background: #1d4ed8;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  transition: background 0.15s;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-dashboards:hover {
  background: #3b82f6;
  color: #ffffff !important;
  text-decoration: none;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
}

.caret-icon { font-size: 10px; opacity: 0.7; }

/* Dropdown */
.main-nav .dropdown-menu {
  background: #0f172a;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 6px;
  margin-top: 6px;
  min-width: 190px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  z-index: 1060;
}

.main-nav .dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.55);
  border-radius: 7px;
  padding: 9px 12px;
  transition: background 0.15s, color 0.15s;
}

.main-nav .dropdown-item:hover {
  background: rgba(255,255,255,0.07);
  color: #ffffff;
}

.main-nav .dropdown-divider {
  border-color: rgba(255,255,255,0.07);
  margin: 4px 0;
}

.dropdown-item-icon {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}

/* Separator */
.nav-separator {
  width: 1px; height: 18px;
  background: rgba(255,255,255,0.08);
  margin: 0 10px;
  flex-shrink: 0;
}

/* User/logout */
.nav-user {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: #94a3b8;
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  background: none;
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
  text-decoration: none;
}

.nav-user:hover {
  background: rgba(255,255,255,0.06);
  color: #fff;
}

/* Mobile toggler */
.main-nav .navbar-toggler {
  border-color: rgba(255,255,255,0.15);
  padding: 5px 9px;
}

/* Mobile collapsed */
@media (max-width: 991px) {
  .main-nav .navbar-collapse {
    background: #0a0f1e;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 8px 24px 12px;
    position: absolute;
    top: 56px; left: 0; right: 0;
    z-index: 1050;
  }
  .btn-dashboards { width: 100%; justify-content: center; margin-top: 6px; }
  .nav-separator { display: none; }
}
    </style>
  </head>
  <body>

    <nav class="navbar navbar-expand-lg navbar-dark main-nav">
      <div class="container-fluid">

        <!-- Brand -->
        <a class="navbar-brand p-0" href="/">
          <img src="/static/fevicon.png" alt="G" height="44" width="44" style="border-radius: 50%;">
        </a>

        <!-- Mobile toggler -->
        <button class="navbar-toggler" type="button"
                data-toggle="collapse" data-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- All nav items -->
        <div class="collapse navbar-collapse" id="navbarMain">
          <ul class="navbar-nav mr-auto align-items-lg-center">
            <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link {% if 'about' in request.path %}active{% endif %}" href="{% url 'about' %}">About Us</a></li>
            <li class="nav-item"><a class="nav-link {% if 'contact' in request.path %}active{% endif %}" href="{% url 'contact' %}">Contact Us</a></li>
            <li class="nav-item"><a class="nav-link {% if 'services' in request.path %}active{% endif %}" href="{% url 'services' %}">Services</a></li>
          </ul>

          <!-- Right side -->
          <div class="d-flex align-items-center">

            <div class="nav-separator d-none d-lg-block"></div>

            <!-- Dashboards dropdown -->
            <div class="nav-item dropdown mr-2">
              <a class="btn-dashboards dropdown-toggle" href="#"
                 id="dashboardDropdown" role="button"
                 data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none"
                     stroke="currentColor" stroke-width="1.6">
                  <rect x="1" y="1" width="6" height="6" rx="1.5"/>
                  <rect x="9" y="1" width="6" height="6" rx="1.5"/>
                  <rect x="1" y="9" width="6" height="6" rx="1.5"/>
                  <rect x="9" y="9" width="6" height="6" rx="1.5"/>
                </svg>
                Dashboards
                <span class="caret-icon">▾</span>
              </a>
              <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dashboardDropdown">
                <a class="dropdown-item" href="{% url 'superset_dashboard' %}">
                  <div class="dropdown-item-icon"
                       style="background:rgba(37,99,235,0.15);color:#60a5fa;">📊</div>
                  Patient Analytics
                </a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" href="{% url 'superset_dashboard1' %}">
                  <div class="dropdown-item-icon"
                       style="background:rgba(124,58,237,0.15);color:#a78bfa;">🏃</div>
                  Clinical Outcomes
                </a>
              </div>
            </div>

            <!-- Login / Logout -->
            {% if request.user.is_authenticated %}
              <form method="post" action="/accounts/logout/" style="margin:0;">
                {% csrf_token %}
                <button type="submit" class="nav-user">
                  👤 {{ request.user.username }} &nbsp;·&nbsp; Logout
                </button>
              </form>
            {% else %}
              <a href="/accounts/login/" class="nav-user">Login</a>
            {% endif %}

          </div>
        </div>
      </div>
    </nav>

    {% block body %}{% endblock body %}

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
            integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
            integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"
            integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
            crossorigin="anonymous"></script>
  </body>
</html>
